name: Cross-compile libcurl for HarmonyOS armeabi-v7a

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout curl source
        uses: actions/checkout@v4
        with:
          repository: yaoshining/curl
          path: curl-src

      - name: Install ARM cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            gcc-arm-linux-gnueabihf \
            libc6-dev-armhf-cross \
            pkg-config \
            curl

      - name: Configure and Build
        run: |
          export CC=arm-linux-gnueabihf-gcc

          echo "Using cross compiler: $CC"
          $CC --version

          mkdir -p curl-build
          cd curl-build

          # Disable SSL/TLS - build without HTTPS support
          cmake .. \
            -G Ninja \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_C_COMPILER=$CC \
            -DCMAKE_C_FLAGS="-fPIC -march=armv7-a -mfpu=neon-vfpv4" \
            -DBUILD_SHARED_LIBS=ON \
            -DCMAKE_USE_OPENSSL=OFF \
            -DENABLE_SSL=OFF \
            -DENABLE_THREADED_RESOLVER=ON \
            -DENABLE_IPV6=ON \
            -DENABLE_LIBPSL=OFF \
            -DENABLE_BROTLI=OFF \
            -DENABLE_ZSTD=OFF \
            -DENABLE_NGHTTP2=OFF \
            -DENABLE_LIBIDN2=OFF \
            -DENABLE_LIBSSH2=OFF \
            -DBUILD_TESTING=OFF \
            -DBUILD_CURL_EXE=OFF \
            ../curl-src

      - name: Build
        run: |
          cd curl-build
          ninja libcurl

      - name: List output files
        run: |
          ls -la curl-build/lib/
          file curl-build/lib/*

      - name: Create symlinks
        run: |
          cd curl-build/lib
          # Create soname symlinks
          for f in libcurl.so.*; do
            if [ -f "$f" ] && [ ! -L "$f" ]; then
              base="${f%.so.*}"
              ln -sf "$f" "${base}.so"
            fi
          done
          ls -la

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libcurl-armeabi-v7a
          path: |
            curl-build/lib/libcurl.so*
          if-no-files-found: error
